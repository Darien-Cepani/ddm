<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" width="520" height="260" role="img" aria-label="Bela Flower Shop logo">
  <defs>
    <linearGradient id="bela-rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E9A7BD"/>
      <stop offset="1" stop-color="#A14E6E"/>
    </linearGradient>
  </defs>
  <rect width="520" height="260" fill="#FAF1F3"/>
  <!-- Floral mark -->
  <g transform="translate(260 78)" fill="none" stroke="url(#bela-rose)" stroke-width="3.2" stroke-linecap="round">
    <g>
      <ellipse cx="0" cy="-26" rx="11" ry="20"/>
      <ellipse cx="0" cy="-26" rx="11" ry="20" transform="rotate(72)"/>
      <ellipse cx="0" cy="-26" rx="11" ry="20" transform="rotate(144)"/>
      <ellipse cx="0" cy="-26" rx="11" ry="20" transform="rotate(216)"/>
      <ellipse cx="0" cy="-26" rx="11" ry="20" transform="rotate(288)"/>
    </g>
    <circle cx="0" cy="0" r="6.5" fill="#D98BA6" stroke="none"/>
  </g>
  <!-- Wordmark -->
  <text x="260" y="170" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-weight="600" font-size="62" letter-spacing="18" fill="#3A2330">BELA</text>
  <!-- Tagline -->
  <text x="260" y="206" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-weight="600" font-size="13" letter-spacing="9" fill="#A14E6E">FLOWER SHOP · TIRANA</text>
  <line x1="150" y1="186" x2="370" y2="186" stroke="#A14E6E" stroke-width="0.8" opacity="0.4"/>
</svg>
